services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: world_beaches
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  # DB をブラウザで確認するための GUI（開発用）。http://localhost:8080
  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db-data:
